<style>
  :root {
    --color-accent: oklch(65% 50% 0);
  }
  html {
    accent-color: var(--color-accent);
  }
  nav { 
    display: flex;
    margin-bottom: 1.5em;
    border-bottom: 1px solid oklch(80% 3% 200); 
  }
  nav ul, nav li { 
    display: contents; 
  }
  nav a { 
    flex: 1; 
    text-decoration: none;     
    color: inherit;            
    text-align: center;         
    padding: 0.5em; 
  }
  nav a.current {
    border-bottom: 0.4em solid oklch(80% 3% 200);
    padding-bottom: 0.1em;     
  }
  nav a:hover {
    border-bottom: 0.4em solid var(--color-accent);
    padding-bottom: 0.1em;
  }
</style>

<h1>Contact</h1>

<form action="mailto:bawan@ucsd.edu">

  <label>
    Email:
    <input name="email" type="email">
  </label>

  <label>
    Subject:
    <input name="subject">
  </label>

  <label>
    Body:
    <textarea name="body" rows="5"></textarea>
  </label>

  <button>Submit</button>

</form>

<style>
  form {
    display: grid;
    grid-template-columns: auto 1fr; 
    gap: 1em;
  }

  label {
    display: grid;
    grid-template-columns: subgrid;
    grid-column: 1 / -1;      
    margin-block: 0.5em;
    font: inherit;
  }

  input, textarea, button {
    display: block;
    width: 100%;
    box-sizing: border-box;
    font: inherit;
  }

  /* 
  label span {
    align-self: center;
  }
  */

  button {
    grid-column: 1 / -1;
  }
</style>
<script src="../global.js" type="module"></script>  
</body>
</html>
