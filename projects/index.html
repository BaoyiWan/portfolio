<style>
    .projects {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(15em, 1fr));
        gap: 1em;
    }

    #projects-pie-plot { /*why the pie plot is so big???*/
        max-width: 20em;
        margin-block: 2em;

        overflow: visible;
    }
    #projects-plot:has(path:hover) { /*target svg????*/
        path:not(:hover) {
            opacity: 0.5;
        }
    }


    #projects-plot path {
        cursor: pointer;
        transition: 300ms; 
    }

    /* .selected {
        --color: oklch(60% 45% 0) !important;

        &:is(path) { 
            fill: var(--color);
        }
    } ???*/
    #projects-plot path.selected {
        fill: oklch(60% 45% 0);
    }

    .legend {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(9em, 1fr));
        gap: 10px;
        padding: 0;
    }
    .legend-item {
        display: flex;
        align-items: center;
        gap: 8px; 
    }
    .legend-item .swatch {
        width: 16px;
        height: 16px;
        aspect-ratio: 1 / 1;
        background-color: var(--color);
    }


    .projects img {
        width: 100%;
        height: auto;
        object-fit: cover;
        display: block;
    }
    /*
    .projects article {
        display: grid;
        grid-template-rows: subgrid;
        grid-row: span 3;
        gap: 1em;
    }
    */
    .projects article {
        display: flex;
        flex-direction: column;
        gap: 0.5em;
    }
    .project-year {
        font-size: 0.9em;
        font-family: Baskerville, "Baskerville Old Face", "Hoefler Text", Garamond, serif;
        font-variant-numeric: oldstyle-nums;
        font-feature-settings: "onum";
        margin: 0;
    }
    .projects h2 {
        margin: 0; 
    }
    h1, h2, h3, h4, h5, h6 {
        line-height: 1.1;
        text-wrap: balance; 
    }

    h1 {
        font-size: 200%; 
    }
</style>
